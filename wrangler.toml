name = "proxy-bot"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Cron trigger to run every 30 minutes
[triggers]
crons = ["*/30 * * * *"]

# Bind the D1 database
[[d1_databases]]
binding = "DB" # This is the variable name you will use in your code
database_name = "proxy_db"
database_id = "c628e818-c660-4809-8d50-688b59c6370c" # Replace with your actual D1 ID
